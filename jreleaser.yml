environment:
  properties:
    gitRootSearch: false

project:
  name: acp-langraph-langchain-bridge
  versionPattern: SEMVER
  description: Bridge module between ACP and LangGraph/LangChain
  copyright: 2025 Charlie Mordant
  website: https://github.com/OsgiliathEnterprise/acp-langgraph-langchain-bridge
  authors:
    - Charlie Mordant
  license: Apache-2.0
  inceptionYear: 2025
  java:
    groupId: net.osgiliath.ai
    version: 21
  links:
    homepage: https://github.com/OsgiliathEnterprise/acp-langgraph-langchain-bridge
  snapshot:
    pattern: .*-SNAPSHOT

platform:
  replacements:
    aarch_64: aarch64

release:
  github:
    enabled: false
    skipRelease: true
    skipTag: true
    overwrite: false

signing:
  active: ALWAYS
  armored: true
  verify: false

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        stagingRepositories:
          - build/staging-deploy
        applyMavenCentralRules: true
        verifyPom: true
