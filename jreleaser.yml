environment:
  properties:
    gitRootSearch: false

project:
  name: acp-langraph-langchain-bridge
  versionPattern: SEMVER
  description: Bridge module between ACP and LangGraph/LangChain
  copyright: 2025 Charlie Mordant
  website: https://github.com/OsgiliathEnterprise/acp-langgraph-langchain-bridge
  authors:
    - Charlie Mordant
  license: Apache-2.0
  inceptionYear: 2025
  java:
    groupId: net.osgiliath.ai
    version: 21
  links:
    homepage: https://github.com/OsgiliathEnterprise/acp-langgraph-langchain-bridge
  snapshot:
    pattern: .*-SNAPSHOT

platform:
  replacements:
    aarch_64: aarch64

release:
  github:
    enabled: false
    skipRelease: true
    skipTag: true
    overwrite: false

signing:
  active: ALWAYS
  armored: true
  verify: false

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://s01.oss.sonatype.org/service/local
        stagingRepositories:
          - build/staging-deploy
        applyMavenCentralRules: true
#        closeRepository: true
#        releaseRepository: true
        verifyPom: true
        # Credentials from environment variables
        username: ${env.MAVEN_CENTRAL_USERNAME:${env.OSSRH_USERNAME}}
        password: ${env.MAVEN_CENTRAL_TOKEN:${env.OSSRH_PASSWORD}}
