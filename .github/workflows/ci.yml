name: CI Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build project
        run: ./gradlew build -x test --stacktrace

      - name: Run tests
        run: ./gradlew test jacocoTestReport --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/
          retention-days: 30

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 30

      - name: Publish test report
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: build/test-results/**/TEST-*.xml
          check_name: Test Results

      - name: Upload test HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 30

      - name: Create test summary comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let testSummary = '## 📋 Build & Test Results\n\n';
            let hasTestResults = false;
            
            try {
              const testResultsPath = 'build/test-results/test';
              if (fs.existsSync(testResultsPath)) {
                const files = fs.readdirSync(testResultsPath);
                const xmlFiles = files.filter(f => f.endsWith('.xml'));
                
                if (xmlFiles.length > 0) {
                  hasTestResults = true;
                  testSummary += `### 📊 Test Files Found\n`;
                  testSummary += `- **Count**: ${xmlFiles.length}\n`;
                  testSummary += `- **Format**: JUnit XML\n\n`;
                }
              }
            } catch (e) {
              console.log('No XML test results found');
            }
            
            if (!hasTestResults) {
              testSummary += '### ✅ Build Completed\n';
              testSummary += '- Tests executed successfully\n';
              testSummary += '- See "Test Results" check for details\n\n';
            }
            
            testSummary += '### 📦 Artifacts\n';
            testSummary += '- Test results available in job artifacts\n';
            testSummary += '- Test HTML reports available in job artifacts\n\n';
            testSummary += '---\n';
            testSummary += '*Generated by GitHub Actions*\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: testSummary
            })

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/reports/
            .gradle/
          retention-days: 7

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Check code style
        run: ./gradlew check --stacktrace || true

      - name: Upload code quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports
          path: build/reports/
          retention-days: 30

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Vulnerability Check
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Check for dependency vulnerabilities
        run: ./gradlew dependencyCheckAnalyze --stacktrace || true

      - name: Upload dependency check reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: build/reports/dependency-check/
          retention-days: 30

  sonarqube-quality-gate:
    runs-on: ubuntu-latest
    name: SonarQube Quality Gate
    needs: build-and-test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download JaCoCo coverage report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/

      - name: Compile classes for SonarJava
        run: ./gradlew classes testClasses --stacktrace

      - name: Validate Sonar configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is missing"
            exit 1
          fi
          if [ -z "$SONAR_HOST_URL" ]; then
            echo "SONAR_HOST_URL is missing"
            exit 1
          fi
          if [ -z "$SONAR_ORGANIZATION" ]; then
            echo "SONAR_ORGANIZATION is missing"
            exit 1
          fi
          if [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "SONAR_PROJECT_KEY is missing"
            exit 1
          fi
          case "$SONAR_HOST_URL" in
            http://*|https://*) ;;
            *)
              echo "SONAR_HOST_URL must include scheme, e.g. https://sonar.example.com"
              exit 1
              ;;
          esac

      - name: Run SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: ./gradlew sonar -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.token="$SONAR_TOKEN" -Dsonar.organization="$SONAR_ORGANIZATION" -Dsonar.projectKey="$SONAR_PROJECT_KEY" -Dsonar.qualitygate.wait=true --stacktrace
